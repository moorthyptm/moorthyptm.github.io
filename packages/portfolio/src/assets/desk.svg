<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300"
  style="filter: drop-shadow(0 8px 30px rgba(0,0,0,0.4));">
  <defs>
    <!-- Premium gradient definitions -->
    <linearGradient id="cpuGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.25)" />
      <stop offset="50%" stop-color="rgba(56,189,248,0.15)" />
      <stop offset="100%" stop-color="rgba(99,102,241,0.1)" />
    </linearGradient>
    <radialGradient id="fanGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#38bdf8" />
    </radialGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="deskEdgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="monitorBezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="laptopBezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <radialGradient id="headGlow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="chairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="speakerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="screenLight" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient light circles -->
  <circle cx="213" cy="140" r="80" fill="#6366f1" opacity="0.03" />
  <circle cx="330" cy="165" r="50" fill="#38bdf8" opacity="0.03" />

  <!-- DESK -->
  <rect x="50" y="205" width="300" height="15" fill="url(#deskGrad)" stroke="#334155" stroke-width="0.5"
    class="desk" rx="1" />
  <rect x="50" y="205" width="300" height="3" fill="url(#deskEdgeGrad)" class="desk-edge" rx="1" />
  <!-- Subtle desk glow strip -->
  <rect x="55" y="219" width="290" height="0.5" fill="#6366f1" opacity="0.15" />
  <rect x="80" y="220" width="10" height="40" fill="#1e293b" stroke="#334155" stroke-width="0.5"
    class="desk-leg" rx="1" />
  <rect x="310" y="220" width="10" height="40" fill="#1e293b" stroke="#334155" stroke-width="0.5"
    class="desk-leg" rx="1" />

  <!-- LAPTOP -->
  <g class="laptop" filter="url(#dropShadow)">
    <path d="M60,205 L110,205 L105,203 L55,203 Z" fill="#475569" />
    <rect x="60" y="201" width="50" height="4" rx="1" fill="#475569" />
    <rect x="62" y="171" width="46" height="30" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1" />
    <!-- Screen area -->
    <rect x="64" y="173" width="42" height="26" rx="1" fill="#000" />
    <g class="browser-window">
      <rect x="64" y="173" width="42" height="4" rx="1" fill="#1e293b" />
      <rect x="66" y="174" width="25" height="2" rx="1" fill="#475569" />
      <rect x="65" y="173" width="8" height="3" rx="1" fill="#334155" />
      <rect x="74" y="173" width="8" height="3" rx="1" fill="#334155" />
      <!-- Traffic lights -->
      <circle cx="66" cy="174.5" r="0.8" fill="#ef4444" />
      <circle cx="68.5" cy="174.5" r="0.8" fill="#eab308" />
      <circle cx="71" cy="174.5" r="0.8" fill="#22c55e" />
      <g class="browser-content">
        <rect x="64" y="178" width="21" height="21" fill="#0f172a" />
        <rect x="66" y="180" width="17" height="2" rx="0.5" fill="#38bdf8" opacity="0.5" />
        <rect x="66" y="183" width="12" height="2" rx="0.5" fill="#c084fc" opacity="0.4" />
        <rect x="66" y="186" width="15" height="2" rx="0.5" fill="#38bdf8" opacity="0.5" />
      </g>
      <g class="code-inspector">
        <rect x="85" y="178" width="21" height="21" fill="#000" />
        <rect x="87" y="180" width="17" height="1" rx="0.5" fill="#818cf8" opacity="0.6" />
        <rect x="87" y="182" width="15" height="1" rx="0.5" fill="#818cf8" opacity="0.6" />
        <rect x="87" y="184" width="16" height="1" rx="0.5" fill="#818cf8" opacity="0.6" />
        <rect x="87" y="186" width="14" height="1" rx="0.5" fill="#818cf8" opacity="0.6" />
        <rect x="87" y="188" width="17" height="1" rx="0.5" fill="#818cf8" opacity="0.6" />
      </g>
      <rect x="85" y="178" width="0.5" height="21" fill="#334155" />
    </g>
    <rect x="62" y="201" width="46" height="4" fill="#334155" />
    <!-- Keyboard backlight glow -->
    <rect x="63" y="201.5" width="44" height="0.5" fill="#6366f1" opacity="0.2" />
  </g>

  <!-- PHONE -->
  <g class="phone" transform="translate(112, 183)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="15" height="25" rx="2" fill="#1e293b" stroke="#6366f1" stroke-width="0.5" />
    <rect x="1" y="1" width="13" height="23" rx="1.5" fill="#000000" class="phone-screen" />
    <g class="linkedin-content" opacity="0">
      <rect x="3" y="3" width="9" height="9" rx="1.5" fill="white" />
      <text x="4" y="9.5" font-family="Arial" font-size="7" font-weight="bold" fill="#0A66C2">
        in
      </text>
      <rect x="3" y="14" width="9" height="1.5" rx="0.75" fill="white" opacity="0.8" />
      <rect x="3" y="17" width="7" height="1.5" rx="0.75" fill="white" opacity="0.8" />
      <rect x="3" y="20" width="8" height="1.5" rx="0.75" fill="white" opacity="0.8" />
    </g>
    <circle cx="7.5" cy="2" r="0.6" fill="#818cf8" filter="url(#softGlow)" />
  </g>

  <!-- SPEAKERS -->
  <g class="speaker speaker-left" filter="url(#dropShadow)">
    <rect x="130" y="175" width="15" height="30" rx="2" fill="url(#speakerGrad)" stroke="#475569"
      stroke-width="0.5" />
    <circle cx="137.5" cy="182" r="3" fill="#0f172a" stroke="#475569" stroke-width="0.5" />
    <circle cx="137.5" cy="182" r="1.5" fill="#1e293b" />
    <circle cx="137.5" cy="192" r="4" fill="#0f172a" stroke="#475569" stroke-width="0.5" />
    <circle cx="137.5" cy="192" r="2" fill="#1e293b" />
    <!-- Speaker glow -->
    <circle cx="137.5" cy="192" r="1" fill="#6366f1" opacity="0.4" filter="url(#softGlow)" />
  </g>
  <g class="speaker speaker-right" filter="url(#dropShadow)">
    <rect x="280" y="175" width="15" height="30" rx="2" fill="url(#speakerGrad)" stroke="#475569"
      stroke-width="0.5" />
    <circle cx="287.5" cy="182" r="3" fill="#0f172a" stroke="#475569" stroke-width="0.5" />
    <circle cx="287.5" cy="182" r="1.5" fill="#1e293b" />
    <circle cx="287.5" cy="192" r="4" fill="#0f172a" stroke="#475569" stroke-width="0.5" />
    <circle cx="287.5" cy="192" r="2" fill="#1e293b" />
    <circle cx="287.5" cy="192" r="1" fill="#6366f1" opacity="0.4" filter="url(#softGlow)" />
  </g>

  <!-- CPU TOWER -->
  <g class="cpu" filter="url(#dropShadow)">
    <rect class="cpu-front" x="315" y="125" width="30" height="80" rx="4" fill="url(#cpuGlass)"
      stroke="#475569" stroke-width="0.5" />
    <!-- Glass reflection -->
    <path d="M317,127 L320,205 L317,205 Z" fill="white" opacity="0.03" />
    <path class="cpu-side" d="M315,125 L305,135 L305,205 L315,205 Z" fill="#1e293b" />
    <!-- LED strips inside CPU -->
    <rect x="318" y="130" width="8" height="1" fill="#38bdf8" opacity="0.5" rx="0.5" />
    <rect x="318" y="133" width="8" height="1" fill="#38bdf8" opacity="0.3" rx="0.5" />
    <rect x="318" y="170" width="12" height="2" fill="#f43f5e" opacity="0.3" rx="1" />
    <g class="fan fan1">
      <g class="fan-blades">
        <rect x="328" y="142" width="4" height="16" fill="#94a3b8" rx="1" />
        <rect x="322" y="147" width="16" height="4" fill="#94a3b8" rx="1" />
      </g>
      <circle cx="330" cy="150" r="8" fill="none" stroke="url(#fanGradient)" stroke-width="2"
        stroke-opacity="1" />
      <circle cx="330" cy="150" r="3" fill="#334155" />
      <!-- Fan glow -->
      <circle cx="330" cy="150" r="9" fill="#818cf8" opacity="0.08" filter="url(#softGlow)" />
    </g>
    <g class="fan fan2">
      <g class="fan-blades">
        <rect x="328" y="182" width="4" height="16" fill="#94a3b8" rx="1" />
        <rect x="322" y="187" width="16" height="4" fill="#94a3b8" rx="1" />
      </g>
      <circle cx="330" cy="190" r="8" fill="none" stroke="url(#fanGradient)" stroke-width="2"
        stroke-opacity="1" />
      <circle cx="330" cy="190" r="3" fill="#334155" />
      <circle cx="330" cy="190" r="9" fill="#818cf8" opacity="0.08" filter="url(#softGlow)" />
    </g>
  </g>

  <!-- MAIN MONITOR -->
  <g class="screen-glow" filter="url(#dropShadow)">
    <!-- Stand base -->
    <rect x="193" y="205" width="40" height="3" fill="#1e293b" rx="1" />
    <!-- Stand neck -->
    <rect x="203" y="190" width="20" height="15" fill="url(#deskGrad)" />
    <!-- Monitor body -->
    <rect x="153" y="115" width="120" height="75" rx="4" fill="url(#monitorBezel)" />
    <!-- Screen -->
    <rect x="158" y="120" width="110" height="65" rx="2" fill="url(#screenGlow)" />
    <!-- Screen border glow -->
    <rect x="158" y="120" width="110" height="65" rx="2" fill="none" stroke="#6366f1" stroke-width="0.5"
      opacity="0.3" />
    <!-- Code on screen -->
    <text x="160" y="129" font-family="monospace" font-size="4.5" fill="#C792EA">const</text>
    <text x="174" y="129" font-family="monospace" font-size="4.5" fill="#FFCB6B">dev</text>
    <text x="183" y="129" font-family="monospace" font-size="4.5" fill="#89DDFF">=</text>
    <text x="187" y="129" font-family="monospace" font-size="4.5" fill="#FFCB6B">{</text>
    <text x="162" y="136" font-family="monospace" font-size="4.5" fill="#F07178">name:</text>
    <text x="175" y="136" font-family="monospace" font-size="4.5" fill="#C3E88D">'Moorthy'</text>
    <text x="195" y="136" font-family="monospace" font-size="4.5" fill="#89DDFF">,</text>
    <text x="162" y="143" font-family="monospace" font-size="4.5" fill="#F07178">tech:</text>
    <text x="175" y="143" font-family="monospace" font-size="4.5" fill="#FFCB6B">[</text>
    <text x="177" y="143" font-family="monospace" font-size="4.5" fill="#C3E88D">'JS'</text>
    <text x="186" y="143" font-family="monospace" font-size="4.5" fill="#89DDFF">,</text>
    <text x="188" y="143" font-family="monospace" font-size="4.5" fill="#C3E88D">'AI'</text>
    <text x="197" y="143" font-family="monospace" font-size="4.5" fill="#FFCB6B">]</text>
    <text x="160" y="150" font-family="monospace" font-size="4.5" fill="#FFCB6B">}</text>
    <!-- Blinking cursor -->
    <rect x="162" y="149" width="0.5" height="4" fill="#818cf8" class="cursor-blink"
      filter="url(#softGlow)" />
    <!-- Monitor outer border -->
    <rect x="153" y="115" width="120" height="75" rx="4" fill="none" stroke="#475569"
      stroke-width="1.5" />
    <!-- Screen reflection -->
    <path d="M158 120 L268 120 L240 150 L158 150 Z" fill="white" opacity="0.015" rx="2" />
  </g>

  <!-- KEYBOARD -->
  <g class="keyboard">
    <rect x="170" y="203" width="80" height="8" rx="2" fill="#1e293b" stroke="#334155"
      stroke-width="0.5" />
    <rect x="172" y="204" width="76" height="6" rx="1" fill="#0f172a" />
    <!-- Keyboard backlight -->
    <rect x="173" y="204.5" width="74" height="5" rx="1" fill="#6366f1" opacity="0.04" />
    <g fill="#475569">
      <rect x="175" y="205" width="4" height="2" rx="0.5" />
      <rect x="181" y="205" width="4" height="2" rx="0.5" />
      <rect x="187" y="205" width="4" height="2" rx="0.5" />
      <rect x="193" y="205" width="4" height="2" rx="0.5" />
      <rect x="199" y="205" width="4" height="2" rx="0.5" />
      <rect x="205" y="205" width="4" height="2" rx="0.5" />
      <rect x="211" y="205" width="4" height="2" rx="0.5" />
      <rect x="217" y="205" width="4" height="2" rx="0.5" />
      <rect x="223" y="205" width="4" height="2" rx="0.5" />
      <rect x="229" y="205" width="4" height="2" rx="0.5" />
      <rect x="235" y="205" width="4" height="2" rx="0.5" />
      <rect x="177" y="208" width="4" height="2" rx="0.5" />
      <rect x="183" y="208" width="4" height="2" rx="0.5" />
      <rect x="189" y="208" width="4" height="2" rx="0.5" />
      <rect x="195" y="208" width="4" height="2" rx="0.5" />
      <rect x="201" y="208" width="4" height="2" rx="0.5" />
      <rect x="207" y="208" width="4" height="2" rx="0.5" />
      <rect x="213" y="208" width="4" height="2" rx="0.5" />
      <rect x="219" y="208" width="4" height="2" rx="0.5" />
      <rect x="225" y="208" width="4" height="2" rx="0.5" />
      <rect x="231" y="208" width="4" height="2" rx="0.5" />
    </g>
  </g>

  <!-- PERSON -->
  <g class="person">
    <!-- Head with premium gradient -->
    <circle cx="210" cy="155" r="18" fill="url(#headGlow)" filter="url(#softGlow)" />
    <!-- Screen reflection on head -->
    <ellipse cx="205" cy="150" rx="5" ry="3" fill="white" opacity="0.12" />
    <!-- Body -->
    <rect x="195" y="173" width="30" height="40" fill="url(#bodyGrad)" rx="3" />
    <!-- Mouse -->
    <g class="mouse-element">
      <path d="M242,195 q3,0 6,2 l2,2 q2,2 2,4 v4 q0,3 -3,3 h-6 q-3,0 -3,-3 v-9 q0,-3 2,-3" fill="#1e293b"
        stroke="#475569" stroke-width="0.5" />
      <path d="M242,196 v6 M248,196 v6" stroke="#334155" stroke-width="0.5" opacity="0.5" />
      <!-- Mouse LED -->
      <circle cx="245" cy="200" r="0.6" fill="#6366f1" opacity="0.6" filter="url(#softGlow)" />
    </g>
    <!-- Arms and hands -->
    <g class="typing-hands">
      <path class="left-arm" d="M200,175 C195,180 185,193 180,201" stroke="#334155" stroke-width="4"
        fill="none" stroke-linecap="round" />
      <path class="right-arm" d="M220,175 C225,180 235,193 242,201" stroke="#334155" stroke-width="4"
        fill="none" stroke-linecap="round" />
      <g class="hand left-hand">
        <rect x="180" y="201" width="12" height="7" rx="2" fill="#334155" />
        <g class="fingers">
          <rect x="182" y="199" width="2" height="6" rx="1" fill="#334155" />
          <rect x="185" y="199" width="2" height="6" rx="1" fill="#334155" />
          <rect x="188" y="199" width="2" height="6" rx="1" fill="#334155" />
        </g>
        <path d="M180,204 q-3,0 -3,-2.5 v-3 q0,-2.5 3,-2.5 h2 v5 z" fill="#334155" />
      </g>
      <g class="hand right-hand">
        <rect x="242" y="197" width="10" height="8" rx="2" fill="#334155" />
        <g class="fingers mouse-grip">
          <path d="M244,197 c0,-2 1,-3 2,-3 h1 c1,0 2,1 2,3" fill="#334155" />
          <path d="M248,197 c0,-2 1,-3 2,-3 h1 c1,0 2,1 2,3" fill="#334155" />
        </g>
        <path d="M241,201 q-2,-1 -2,-3 v-2 q0,-2 2,-2 h2 v4 z" fill="#334155" />
      </g>
    </g>
  </g>

  <!-- CHAIR -->
  <g class="chair" filter="url(#dropShadow)">
    <rect x="185" y="205" width="50" height="45" rx="3" fill="url(#chairGrad)" stroke="#334155"
      stroke-width="0.5" />
    <rect x="190" y="210" width="40" height="35" rx="2" fill="#0f172a" opacity="0.6" />
    <rect x="185" y="205" width="50" height="5" fill="#475569" rx="2" />
    <rect x="190" y="250" width="5" height="20" fill="#1e293b" rx="1" />
    <rect x="230" y="250" width="5" height="20" fill="#1e293b" rx="1" />
  </g>
</svg>
